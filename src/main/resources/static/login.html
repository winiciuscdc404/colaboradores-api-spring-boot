<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">

</head>
<body>

    <div class="login-card">

        <div class="login-logo">
            <div class="logo-dot"></div>
            <span>Colaboradores</span>
        </div>

        <h1 class="login-title">Bem vindo de volta!</h1>
        <p class="login-subtitle">Entre com suas credenciais.</p>

        <div class="erro-msg" id=erro-msg">
            Nome ou senha incorretos.
        </div>

        <div class="form-group">
            <label>Nome</label>
            <input type="text" id="input-nome" placeholder="Seu nome" autofocus>
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="input-senha" placeholder="••••••••">
        </div>

        <button class="btn-login" id="btn-login" onclick="login()">
            Entrar
        </button>

    </div>

    <script src="js/login.js"></script>

</body>
</html>
